name: Smart CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  actions: read
  security-events: write

concurrency:
  group: smart-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "17"
  DATABASE_URL: postgresql://menumaker:menumaker@localhost:5432/menumaker_migration_test
  FRONTEND_URL: http://localhost:5173

jobs:
  backend:
    name: Backend contract, tests, migrations, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: menumaker
          POSTGRES_PASSWORD: menumaker
          POSTGRES_DB: menumaker_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U menumaker"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run api:generate --workspace=backend
      - run: npm test --workspace=backend -- app-contract.test.ts --runInBand
      - run: npm run migrate:test:clean --workspace=backend
      - run: npm run test --workspace=backend -- database-config --runInBand
      - run: npm test --workspace=backend -- migrations.test.ts --runInBand
      - run: npm run build --workspace=backend
      - run: npm audit --audit-level=high

  frontend:
    name: Frontend tests, design-system gate, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: node frontend/scripts/validate-tokens.cjs frontend/design-tokens.json
      - run: node frontend/scripts/sync-tokens.cjs --check
      - run: bash scripts/design-system/check-drift.sh
      - run: npm run test:ci --workspace=frontend
      - run: npm run build --workspace=frontend
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: web-dist
          path: frontend/dist

  privacy-security:
    name: Privacy, credential, and release security gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: python3 scripts/security/verify_data_inventory.py docs/security/data-inventory.yaml backend/src/models frontend/src android/app/src/main ios/MenuMaker
      - run: python3 scripts/security/validate_threat_model.py docs/security/threat-model.md docs/security/data-inventory.yaml
      - run: npm test --workspace=backend -- GDPRService.integration.test.ts --runInBand
      - run: npm test --workspace=backend -- credential-encryption.test.ts --runInBand
      - run: python3 scripts/release/verify_mobile_data_practices.py docs/release/mobile-data-practices.yaml ios/MenuMaker/Info.plist android/app/src/main/AndroidManifest.xml
      - run: bash scripts/security/release-security-gate.sh --ci-contract-only

  android:
    name: Android generated contract and flavors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - run: ./gradlew openApiGenerate testSellerDebugUnitTest testCustomerDebugUnitTest
        working-directory: android

  ios:
    name: iOS generated contract and approved scheme
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: bash Scripts/generate-openapi-client.sh --check
        working-directory: ios
      - run: xcodebuild -project MenuMaker.xcodeproj -list
        working-directory: ios
      - run: xcodebuild -project MenuMaker.xcodeproj -scheme MenuMaker -destination 'generic/platform=iOS Simulator' build
        working-directory: ios

  terraform:
    name: Terraform validate and environment plans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
      - run: terraform -chdir=infrastructure init -backend=false
      - run: terraform -chdir=infrastructure fmt -check -recursive
      - run: terraform -chdir=infrastructure validate
      - run: terraform -chdir=infrastructure plan -input=false -var-file=environments/dev.tfvars -out=dev.tfplan
      - run: terraform -chdir=infrastructure plan -input=false -var-file=environments/staging.tfvars -out=staging.tfplan
      - run: terraform -chdir=infrastructure plan -input=false -var-file=environments/prod.tfvars -out=prod.tfplan
      - run: python3 scripts/ci/audit_workflows.py .github/workflows/smart-ci.yml

  artifact-manifest:
    name: Immutable artifact manifest
    runs-on: ubuntu-latest
    needs: [backend, frontend, android, ios, terraform]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: web-dist
          path: frontend/dist
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-source
          path: |
            package-lock.json
            openapi/menumaker.v1.yaml
      - name: Write manifest
        run: |
          mkdir -p artifacts
          web_checksum="$(find frontend/dist -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum | awk '{print $1}')"
          lock_checksum="$(sha256sum package-lock.json | awk '{print $1}')"
          cat > artifacts/artifact-manifest.json <<JSON
          {
            "source_sha": "${GITHUB_SHA}",
            "dependency_lock_sha256": "${lock_checksum}",
            "image_digest": "${API_IMAGE_DIGEST:-pending-ecr-publication}",
            "web_checksum": "${web_checksum}",
            "android_aab_checksums": [],
            "ios_archive_checksum": "pending-notarized-archive",
            "gate_run_url": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "artifact_targets": ["ECR", "versioned S3", "GitHub Actions artifacts"]
          }
          JSON
          cat artifacts/artifact-manifest.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: artifact-manifest
          path: artifacts/artifact-manifest.json

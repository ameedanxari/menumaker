name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20.x'

jobs:
  # Infrastructure job
  infrastructure:
    name: Terraform Apply
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./infrastructure
        run: terraform init

      - name: Terraform Apply
        working-directory: ./infrastructure
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform apply -auto-approve

  # Mobile build jobs
  build-mobile:
    name: Build Mobile Apps
    runs-on: macos-latest
    needs: infrastructure
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # iOS Builds
      - name: Build iOS Business
        working-directory: ./ios
        run: xcodebuild -project MenuMaker.xcodeproj -scheme MenuMaker-Business -configuration Release
      - name: Build iOS Customer
        working-directory: ./ios
        run: xcodebuild -project MenuMaker.xcodeproj -scheme MenuMaker-Customer -configuration Release

      # Android Builds
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Android Business
        working-directory: ./android
        run: ./gradlew assembleBusinessRelease
      - name: Build Android Customer
        working-directory: ./android
        run: ./gradlew assembleCustomerRelease

  # Existing web deployment jobs...
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: [build-mobile]
    # ... existing web deploy steps ...

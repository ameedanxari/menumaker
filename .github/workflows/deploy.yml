name: Protected Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment target
        required: true
        type: choice
        options: [staging, production]
      manifest_run_id:
        description: GitHub Actions run id containing artifact-manifest
        required: true
      manifest_sha:
        description: Expected source SHA recorded in artifact-manifest.json
        required: true

permissions:
  contents: read
  id-token: write
  actions: read

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  TF_ENV: ${{ inputs.environment == 'production' && 'prod' || 'staging' }}

jobs:
  promote:
    name: Plan, migrate, deploy, verify, rollback
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd

      - uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download immutable artifact manifest
        env:
          GH_TOKEN: ${{ github.token }}
          MANIFEST_RUN_ID: ${{ inputs.manifest_run_id }}
          EXPECTED_SHA: ${{ inputs.manifest_sha }}
        run: |
          gh run download "${MANIFEST_RUN_ID}" --name artifact-manifest --dir artifacts
          test -f artifacts/artifact-manifest.json
          actual_sha="$(jq -r '.source_sha' artifacts/artifact-manifest.json)"
          test "${actual_sha}" = "${EXPECTED_SHA}"
          jq -e '.image_digest | test("@sha256:[0-9a-f]{64}$")' artifacts/artifact-manifest.json
          jq -e '.web_checksum | length > 0' artifacts/artifact-manifest.json

      - name: Terraform plan
        run: |
          terraform -chdir=infrastructure init
          terraform -chdir=infrastructure validate
          terraform -chdir=infrastructure plan \
            -input=false \
            -var-file="environments/${TF_ENV}.tfvars" \
            -var "allow_offline_plan=false" \
            -var "api_image_digest=$(jq -r '.image_digest' artifacts/artifact-manifest.json)" \
            -out="${TF_ENV}.tfplan"

      - name: Terraform apply after environment approval
        run: terraform -chdir=infrastructure apply -input=false "${TF_ENV}.tfplan"

      - name: Run migration job once
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_MIGRATION_JOB: "true"
        run: |
          npm ci
          npm run migration:run --workspace=backend

      - name: Capture current service for rollback
        run: |
          aws ecs describe-services \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --services "${{ vars.ECS_SERVICE_NAME }}" \
            > artifacts/prior-service.json

      - name: Update ECS service by image digest
        run: |
          image_digest="$(jq -r '.image_digest' artifacts/artifact-manifest.json)"
          task_definition="$(aws ecs describe-task-definition --task-definition "${{ vars.ECS_TASK_FAMILY }}")"
          echo "${task_definition}" \
            | jq --arg image "${image_digest}" '.taskDefinition.containerDefinitions[0].image = $image | .taskDefinition | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
            > artifacts/task-definition.json
          aws ecs register-task-definition --cli-input-json file://artifacts/task-definition.json > artifacts/new-task-definition.json
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
            --service "${{ vars.ECS_SERVICE_NAME }}" \
            --task-definition "$(jq -r '.taskDefinition.taskDefinitionArn' artifacts/new-task-definition.json)"

      - name: Publish web artifact by checksum
        run: |
          gh run download "${{ inputs.manifest_run_id }}" --name web-dist --dir artifacts/web-dist
          expected="$(jq -r '.web_checksum' artifacts/artifact-manifest.json)"
          actual="$(find artifacts/web-dist -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum | awk '{print $1}')"
          test "${actual}" = "${expected}"
          aws s3 sync artifacts/web-dist "s3://${{ vars.WEB_BUCKET_NAME }}/releases/${{ inputs.manifest_sha }}/" --delete
          aws cloudfront create-invalidation --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"

      - name: Verify deployment and rollback on smoke failure
        env:
          DEPLOY_ENVIRONMENT: ${{ env.TF_ENV }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          WEB_BASE_URL: ${{ vars.WEB_BASE_URL }}
          EXPECTED_MANIFEST: artifacts/artifact-manifest.json
        run: |
          if ! scripts/release/verify-deployment.sh --environment "${DEPLOY_ENVIRONMENT}" --expected-manifest "${EXPECTED_MANIFEST}"; then
            prior_task="$(jq -r '.services[0].taskDefinition' artifacts/prior-service.json)"
            aws ecs update-service \
              --cluster "${{ vars.ECS_CLUSTER_NAME }}" \
              --service "${{ vars.ECS_SERVICE_NAME }}" \
              --task-definition "${prior_task}"
            aws s3 sync "s3://${{ vars.WEB_BUCKET_NAME }}/previous/" "s3://${{ vars.WEB_BUCKET_NAME }}/current/" --delete
            jq -n \
              --arg environment "${DEPLOY_ENVIRONMENT}" \
              --arg manifest "${{ inputs.manifest_sha }}" \
              --arg prior_task "${prior_task}" \
              '{environment:$environment, manifest_sha:$manifest, rollback:"ecs_and_web", prior_task_definition:$prior_task, database:"not_auto_reverted"}' \
              > artifacts/incident-artifact.json
            exit 1
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: deploy-evidence-${{ inputs.environment }}
          path: artifacts
